<script>
// ── Lunar ─────────────────────────────────────────────────────
function jde_new_moon(k){
  const T=k/1236.85,T2=T*T,T3=T2*T,T4=T3*T;
  let J=2451550.09766+29.530588861*k+0.00015437*T2-1.5e-7*T3+7.3e-10*T4;
  const E=1-0.002516*T-7.4e-6*T2;
  const M=(2.5534+29.10535670*k-1.4e-6*T2-1.1e-7*T3)*Math.PI/180;
  const M1=(201.5643+385.81693528*k+0.0107582*T2+1.238e-5*T3-5.8e-8*T4)*Math.PI/180;
  const F=(160.7108+390.67050284*k-0.0016118*T2-2.27e-6*T3+1.1e-8*T4)*Math.PI/180;
  const Om=(124.7746-1.56375588*k+0.0020672*T2+2.15e-6*T3)*Math.PI/180;
  const A1=(299.77+0.107408*k-0.009173*T2)*Math.PI/180;
  const A2=(251.88+0.016321*k)*Math.PI/180;
  J+=-0.40720*Math.sin(M1)+0.17241*E*Math.sin(M)+0.01608*Math.sin(2*M1)
    +0.01039*Math.sin(2*F)+0.00739*E*Math.sin(M1-M)-0.00514*E*Math.sin(M1+M)
    +0.00208*E*E*Math.sin(2*M)-0.00111*Math.sin(M1-2*F)-0.00057*Math.sin(M1+2*F)
    +0.00056*E*Math.sin(2*M1+M)-0.00042*Math.sin(3*M1)+0.00042*E*Math.sin(M+2*F)
    +0.00038*E*Math.sin(M-2*F)-0.00024*E*Math.sin(2*M1-M)-0.00017*Math.sin(Om)
    -0.00007*Math.sin(M1+2*M)+0.00004*Math.sin(2*M1-2*F)+0.00004*Math.sin(3*M)
    +0.00003*Math.sin(M1+M-2*F)+0.00003*Math.sin(2*M1+2*F)-0.00003*Math.sin(M1+M+2*F)
    +0.00003*Math.sin(M1-M+2*F)-0.00002*Math.sin(M1-M-2*F)-0.00002*Math.sin(3*M1+M)
    +0.00002*Math.sin(4*M1)+0.000325*Math.sin(A1)+0.000165*Math.sin(A2);
  return J;
}
function jde_to_date(jde){
  const jd=jde+8/24+0.5,Z=Math.floor(jd);
  let A=Z;if(Z>=2299161){const a=Math.floor((Z-1867216.25)/36524.25);A=Z+1+a-Math.floor(a/4);}
  const B=A+1524,C=Math.floor((B-122.1)/365.25),D=Math.floor(365.25*C),Ev=Math.floor((B-D)/30.6001);
  return{year:Ev<14?C-4716:C-4715,month:Ev<14?Ev-1:Ev-13,day:B-D-Math.floor(30.6001*Ev)};
}
function date_to_jdn(y,m,d){
  const a=Math.floor((14-m)/12),yr=y+4800-a,mo=m+12*a-3;
  return d+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)-32045;
}
const leapMonths={1957:8,1960:6,1963:4,1966:3,1968:7,1971:5,1974:4,1976:8,1979:6,
  1982:4,1984:10,1987:6,1990:5,1993:3,1995:8,1998:5,
  2001:4,2004:2,2006:7,2009:5,2012:4,2014:9,2017:6,2020:4,2023:2,2025:6};
const cny={
  1920:[2,20],1921:[2,8],1922:[1,28],1923:[2,16],1924:[2,5],1925:[1,24],1926:[2,13],1927:[2,2],1928:[1,23],1929:[2,10],
  1930:[1,30],1931:[2,17],1932:[2,6],1933:[1,26],1934:[2,14],1935:[2,4],1936:[1,24],1937:[2,11],1938:[1,31],1939:[2,19],
  1940:[2,8],1941:[1,27],1942:[2,15],1943:[2,5],1944:[1,25],1945:[2,13],1946:[2,2],1947:[1,22],1948:[2,10],1949:[1,29],
  1950:[2,17],1951:[2,6],1952:[1,27],1953:[2,14],1954:[2,3],1955:[1,24],1956:[2,12],1957:[1,31],1958:[2,18],1959:[2,8],
  1960:[1,28],1961:[2,15],1962:[2,5],1963:[1,25],1964:[2,13],1965:[2,2],1966:[1,21],1967:[2,9],1968:[1,30],1969:[2,17],
  1970:[2,6],1971:[1,27],1972:[2,15],1973:[2,3],1974:[1,23],1975:[2,11],1976:[1,31],1977:[2,18],1978:[2,7],1979:[1,28],
  1980:[2,16],1981:[2,5],1982:[1,25],1983:[2,13],1984:[2,2],1985:[2,20],1986:[2,9],1987:[1,29],1988:[2,17],1989:[2,6],
  1990:[1,27],1991:[2,15],1992:[2,4],1993:[1,23],1994:[2,10],1995:[1,31],1996:[2,19],1997:[2,7],1998:[1,28],1999:[2,16],
  2000:[2,5],2001:[1,24],2002:[2,12],2003:[2,1],2004:[1,22],2005:[2,9],2006:[1,29],2007:[2,18],2008:[2,7],2009:[1,26],
  2010:[2,14],2011:[2,3],2012:[1,23],2013:[2,10],2014:[1,31],2015:[2,19],2016:[2,8],2017:[1,28],2018:[2,16],2019:[2,5],
  2020:[1,25],2021:[2,12],2022:[2,1],2023:[1,22],2024:[2,10],2025:[1,29],2026:[2,17],2027:[2,6],
};
const nmSet=(()=>{
  const arr=[];
  const k0=Math.floor((1918-2001)*12.3685)-3,k1=Math.ceil((2028-1999)*12.3685)+3;
  for(let k=k0;k<=k1;k++){
    const d=jde_to_date(jde_new_moon(k));
    if(d.year>=1918&&d.year<=2029) arr.push(date_to_jdn(d.year,d.month,d.day));
  }
  return [...new Set(arr)].sort((a,b)=>a-b);
})();
function solarToLunar(sy,sm,sd){
  const tJDN=date_to_jdn(sy,sm,sd);
  let ly=sy;
  const sfThis=cny[sy];if(!sfThis) return null;
  if(tJDN<date_to_jdn(sy,sfThis[0],sfThis[1])) ly=sy-1;
  const sf=cny[ly];if(!sf) return null;
  const cnyJDN=date_to_jdn(ly,sf[0],sf[1]);
  const starts=nmSet.filter(j=>j>=cnyJDN).slice(0,15);
  let idx=0;
  for(let i=0;i<starts.length-1;i++){if(tJDN>=starts[i]&&tJDN<starts[i+1]){idx=i;break;}}
  const leap=leapMonths[ly]||0;
  let lm,isLeap=false;
  if(!leap){lm=idx+1;}
  else if(idx<leap){lm=idx+1;}
  else if(idx===leap){lm=leap;isLeap=true;}
  else{lm=idx;}
  return{year:ly,month:lm,day:tJDN-starts[idx]+1,isLeap};
}

// ── Numerology ────────────────────────────────────────────────
function digs(n){return String(Math.abs(Math.floor(n))).split('').map(Number);}
function sumArr(a){return a.reduce((x,y)=>x+y,0);}
function reduce(total){
  const parts=[total];let n=total;
  while(n>=10){n=digs(n).reduce((a,b)=>a+b,0);parts.push(n);}
  return parts;
}
function makeStage(total){
  if(total===0) return{str:'0',destiny:0,pathNums:[]};
  const parts=reduce(total);
  const str=parts.join('/');
  const destiny=parts[parts.length-1];
  const pathNums=[];
  for(let i=0;i<parts.length-1;i++){
    const p=parts[i];
    if(p>=10) digs(p).forEach(d=>{if(d>0&&!pathNums.includes(d))pathNums.push(d);});
    else if(p>0&&!pathNums.includes(p)) pathNums.push(p);
  }
  return{str,destiny,pathNums};
}
function calcStages(y,m,d,h,mn){
  const yD=digs(y),mD=p2(m).split('').map(Number),dD=p2(d).split('').map(Number);
  const innate=[...yD,...mD,...dD];
  const stages=[];
  stages.push({name:'老年',...makeStage(sumArr(yD))});
  stages.push({name:'中年',...makeStage(sumArr([...yD,...mD]))});
  stages.push({name:'青年',...makeStage(sumArr([...yD,...mD,...dD])),isDestiny:true});
  if(h!==null){
    stages.push({name:'少年',...makeStage(sumArr([...yD,...mD,...dD,...digs(h)]))});
    if(mn!==null){
      stages.push({name:'幼年',...makeStage(sumArr([...yD,...mD,...dD,...digs(h),...digs(mn)]))});
    }
  }
  const order=['幼年','少年','青年','中年','老年'];
  stages.sort((a,b)=>order.indexOf(a.name)-order.indexOf(b.name));
  return{innate,stages};
}
function calcLevel(innate,destiny,pathNums){
  const set=new Set(innate.filter(n=>n>0));
  const hasD=set.has(destiny);
  const allP=pathNums.filter(n=>n>0&&n!==destiny);
  const hasAllP=allP.length>0&&allP.every(n=>set.has(n));
  const hasSomeP=allP.some(n=>set.has(n));
  const counts={};
  for(const n of innate){if(n>0)counts[n]=(counts[n]||0)+1;}
  const hasObs=Object.values(counts).some(c=>c>=3);
  let level;
  if(!hasD&&!hasSomeP) level=1;
  else if(!hasD&&hasSomeP&&!hasAllP) level=2;
  else if(!hasD&&hasAllP) level=3;
  else if(hasD&&allP.length===0) level=4;
  else if(hasD&&!hasSomeP&&allP.length>0) level=4;
  else if(hasD&&hasSomeP&&!hasAllP) level=5;
  else if(hasD&&hasAllP&&hasObs) level=6;
  else level=7;
  return{level};
}
function calcFlow(y,m,d,targetY,targetM,targetD){
  const yD=digs(y),mD=digs(m),dD=digs(d);
  const fy=makeStage(sumArr([...digs(targetY),...mD,...dD]));
  const fm=makeStage(sumArr([...yD,...digs(targetM),...dD]));
  const fd=makeStage(sumArr([...yD,...mD,...digs(targetD)]));
  return{fy,fm,fd};
}

// ── Render ────────────────────────────────────────────────────
function p2(n){return n<10?'0'+n:String(n);}

function renderCalSection(el,title,dateStr,y,m,d,h,mn,innate){
  const{stages}=calcStages(y,m,d,h,mn);
  const hasTime=h!==null,hasMins=mn!==null;
  const cols=hasTime?(hasMins?5:4):3;
  const dateParts=[y,m,d];
  if(hasTime) dateParts.push(h);
  if(hasMins) dateParts.push(mn);
  const colStyle=`grid-template-columns:repeat(${cols},${cols<5?'minmax(60px,120px)':'1fr'});${cols<5?'justify-content:center;':''}`;
  let headerCells=dateParts.map((v,i)=>
    `<div class="num-cell label">${i===0?v:p2(v)}</div>`).join('');
  const stageOrder=['老年','中年','青年','少年','幼年'].slice(0,cols);
  let stageCells=stageOrder.map(name=>{
    const s=stages.find(x=>x.name===name);
    if(!s) return`<div class="num-cell"></div>`;
    const lv=calcLevel(innate,s.destiny,s.pathNums);
    const isd=name==='青年';
    return`<div class="num-cell"><div class="stage-val">
      <span class="stage-num${isd?' destiny':''}">${s.str}</span>
      <span class="stage-lv">${lv.level}</span>
    </div></div>`;
  }).join('');
  el.innerHTML=`
  <div class="cal-title">${title} <span>${dateStr}</span></div>
  <div class="num-header" style="${colStyle}">${headerCells}</div>
  <div class="num-row" style="${colStyle}">${stageCells}</div>`;
}

function renderInnate(el,innate,label,isLunar){
  const counts={};
  for(const n of innate){if(n>0)counts[n]=(counts[n]||0)+1;}
  const sorted=[...innate].sort((a,b)=>a-b);
  const nums=sorted.map(n=>{
    const c=counts[n]||0;
    const cls=n===0?'inn':(c>=3?'inn obs':(c>=1?'inn has':'inn'));
    return`<span class="${cls}">${n}</span>`;
  }).join('');
  el.innerHTML=`<span class="innate-label">${label}</span><div class="innate-nums">${nums}</div>`;
}

function renderFlow(el,gregY,gregM,gregD,lunY,lunM,lunD,todayY,todayM,todayD){
  const gfl=calcFlow(gregY,gregM,gregD,todayY,todayM,todayD);
  const lunarToday=solarToLunar(todayY,todayM,todayD);
  const lty=lunarToday?lunarToday.year:todayY;
  const ltm=lunarToday?lunarToday.month:todayM;
  const ltd=lunarToday?lunarToday.day:todayD;
  const lfl=calcFlow(lunY,lunM,lunD,lty,ltm,ltd);
  const gInnate=[...digs(gregY),...digs(gregM),...digs(gregD)];
  const lInnate=[...digs(lunY),...digs(lunM),...digs(lunD)];
  function lvBadge(s,innate){
    const lv=calcLevel(innate,s.destiny,s.pathNums);
    return`<span class="flow-num">${s.str}</span><span class="flow-lv">${lv.level}</span>`;
  }
  el.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;width:100%;padding:0 20px;box-sizing:border-box">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="innate-title" style="margin:0 0 6px">流年</div>
      <div class="flow-item"><span class="sign">+</span>${lvBadge(gfl.fy,gInnate)}</div>
      <div class="flow-item"><span class="sign">-</span>${lvBadge(lfl.fy,lInnate)}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="innate-title" style="margin:0 0 6px">流月</div>
      <div class="flow-item"><span class="sign">+</span>${lvBadge(gfl.fm,gInnate)}</div>
      <div class="flow-item"><span class="sign">-</span>${lvBadge(lfl.fm,lInnate)}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="innate-title" style="margin:0 0 6px">流日</div>
      <div class="flow-item"><span class="sign">+</span>${lvBadge(gfl.fd,gInnate)}</div>
      <div class="flow-item"><span class="sign">-</span>${lvBadge(lfl.fd,lInnate)}</div>
    </div>
  </div>`;
}

function renderFlowYearTable(el,birthY,birthM,birthD,innate,title){
  const currentYear=new Date().getFullYear();
  const rows=[];
  for(let age=1;age<=99;age++){
    const year=birthY+age-1;
    const fyD=digs(year),mD=digs(birthM),dD=digs(birthD);
    const total=sumArr([...fyD,...mD,...dD]);
    const stage=makeStage(total);
    const lv=calcLevel(innate,stage.destiny,stage.pathNums);
    rows.push({age,year,stage,lv});
  }
  const groups=[];
  for(let i=0;i<rows.length;i+=9) groups.push(rows.slice(i,i+9));
  let html=`<div class="flow-year-table"><div class="flow-year-title">${title}</div>`;
  for(const group of groups){
    while(group.length<9) group.push(null);
    const ageCells=group.map(r=>r
      ?`<div class="fyt-cell age-row${r.year===currentYear?' current':''}"><div class="fyt-age">${r.age}</div></div>`
      :'<div class="fyt-cell age-row"></div>').join('');
    const yearCells=group.map(r=>r
      ?`<div class="fyt-cell year-row${r.year===currentYear?' current':''}"><div class="fyt-year">${r.year}</div></div>`
      :'<div class="fyt-cell year-row"></div>').join('');
    const numCells=group.map(r=>{
      if(!r) return'<div class="fyt-cell num-row"></div>';
      const parts=r.stage.str.split('/');
      const fmt=parts.map((p,i)=>i===parts.length-1?`<span class="d">${p}</span>`:`${p}/`).join('');
      return`<div class="fyt-cell num-row${r.year===currentYear?' current':''}"><div class="fyt-num">${fmt}<span class="lv">${r.lv.level}</span></div></div>`;
    }).join('');
    html+=`<div class="fyt-group"><div class="fyt-grid">${ageCells}${yearCells}${numCells}</div></div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

// ── Main ──────────────────────────────────────────────────────
function calculate(){
  const dateRaw=document.getElementById('dateInput').value.trim();
  const dateParts=dateRaw.split(/[\/\-\.]/);
  const sy=parseInt(dateParts[0])||0;
  const sm=parseInt(dateParts[1])||0;
  const sd=parseInt(dateParts[2])||0;
  const shv=document.getElementById('hourInput').value.trim();
  const smnv=document.getElementById('minInput').value.trim();
  const sh=shv!==''?parseInt(shv):null;
  const smn=smnv!==''?parseInt(smnv):null;
  const errEl=document.getElementById('errorMsg');
  const main=document.getElementById('mainResult');
  errEl.classList.add('hidden');
  if(!sy||!sm||!sd||sy<1920||sy>2020||sm<1||sm>12||sd<1||sd>31){
    errEl.textContent='請輸入正確的西元生日（1920–2020）';
    errEl.classList.remove('hidden');main.classList.add('hidden');return;
  }
  const lunar=solarToLunar(sy,sm,sd);
  if(!lunar){
    errEl.textContent='農曆換算失敗，請確認年份範圍';
    errEl.classList.remove('hidden');main.classList.add('hidden');return;
  }
  const{year:ly,month:lm,day:ld,isLeap}=lunar;
  const gInnate=String(sy).split('').concat(p2(sm).split(''),p2(sd).split('')).map(Number);
  const lInnate=String(ly).split('').concat(p2(lm).split(''),p2(ld).split('')).map(Number);
  renderCalSection(document.getElementById('gregSection'),'國曆 (+)',`${sy}/${p2(sm)}/${p2(sd)}`,sy,sm,sd,sh,smn,gInnate);
  renderCalSection(document.getElementById('lunSection'),'農曆 (-)',`${ly}/${p2(lm)}/${p2(ld)}${isLeap?'(閏)':''}`,ly,lm,ld,sh,smn,lInnate);
  renderInnate(document.getElementById('gregInnate'),gInnate,'國曆',false);
  renderInnate(document.getElementById('lunInnate'),lInnate,'農曆',true);
  const now=new Date();
  renderFlow(document.getElementById('flowSection'),sy,sm,sd,ly,lm,ld,now.getFullYear(),now.getMonth()+1,now.getDate());
  renderFlowYearTable(document.getElementById('gregFlowTable'),sy,sm,sd,gInnate,'國曆 (+) 九年能量波動表');
  renderFlowYearTable(document.getElementById('lunFlowTable'),ly,lm,ld,lInnate,'農曆 (-) 九年能量波動表');
  main.classList.remove('hidden');
}
function switchTab(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  document.querySelectorAll('.panel').forEach((p,i)=>p.classList.toggle('active',i===idx));
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')calculate();});
// Set today's date display
(function(){
  const now = new Date();
  const y = now.getFullYear();
  const m = String(now.getMonth()+1).padStart(2,'0');
  const d = String(now.getDate()).padStart(2,'0');
  document.getElementById('todayDisplay').textContent = '今天　' + y + '/' + m + '/' + d;
})();

document.getElementById('dateInput').addEventListener('input',function(){
  if(this.value.length===10) document.getElementById('hourInput').focus();
});
document.getElementById('hourInput').addEventListener('input',function(){
  if(this.value.length===2) document.getElementById('minInput').focus();
});
document.getElementById('minInput').addEventListener('input',function(){
  if(this.value.length===2) document.getElementById('calcBtn').focus();
});
</script>
