<html lang="zh-TW">
<head>

<title>彩虹數字計算器</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@300;400;500&family=MPLUS+1+Code:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;color:#1a1a1a;font-family:'M PLUS Rounded 1c',sans-serif;min-height:100vh;padding:0 0 60px}
.page{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.header{padding:32px 24px 20px;text-align:center;position:relative}
.lang-btn{position:absolute;top:32px;right:20px;font-size:11px;color:#999;border:1px solid #ddd;border-radius:12px;padding:4px 10px;cursor:pointer;background:#fff;font-family:'M PLUS Rounded 1c',sans-serif;letter-spacing:.05em;transition:all .15s}
.lang-btn:hover{color:#555;border-color:#bbb}
.input-area{padding:0 20px 20px}
.input-note{font-size:13px;color:#777;margin-bottom:16px;line-height:1.6}
.input-row{display:flex;gap:10px;margin-bottom:10px}
.input-group{display:flex;flex-direction:column;gap:4px}
.input-group label{font-size:11px;color:#999;letter-spacing:.05em}
.input-group input{border:1px solid #ddd;border-radius:6px;padding:10px 12px;font-size:16px;font-family:'MPLUS1Code',monospace;color:#1a1a1a;outline:none;background:#fff;width:100%}
.input-group input:focus{border-color:#666}
.input-group input::placeholder{color:#ccc}
.input-group.date{flex:3}
.input-group.time{flex:2}
.calc-btn{width:100%;padding:13px;background:#fff;border:1px solid #bbb;border-radius:8px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:15px;color:#555;letter-spacing:.2em;cursor:pointer;margin-top:4px;transition:all .15s}
.calc-btn:hover{background:#f0f0f0;border-color:#999}
.tabs{display:flex;border-bottom:1px solid #e8e8e8}
.tab{flex:1;padding:12px 4px;font-size:13px;letter-spacing:.05em;text-align:center;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.results{padding:0 20px}
.cal-section{margin-top:24px}
.cal-title{font-size:13px;font-weight:500;letter-spacing:.1em;color:#1a1a1a;margin-bottom:12px;text-align:center}
.cal-title span{color:#1a1a1a;font-weight:400;font-size:13px;margin-left:6px}
.num-header{display:grid;gap:0;border-bottom:2px solid #1a1a1a;padding-bottom:8px;margin-bottom:10px;justify-items:center}
.num-row{display:grid;gap:0;align-items:center;justify-items:center}
.num-header,.num-row{grid-template-columns:repeat(5,1fr)}
.num-cell{text-align:center;padding:4px 2px}
.num-cell.label{font-size:15px;font-weight:500;color:#1a1a1a;font-family:'MPLUS1Code',monospace;letter-spacing:0}
.stage-val{display:flex;align-items:baseline;justify-content:center;gap:2px}
.stage-num{font-size:14px;color:#1a1a1a;font-family:'MPLUS1Code',monospace;letter-spacing:0}
.stage-num.destiny{font-size:15px;font-weight:500;font-family:'MPLUS1Code',monospace}
.stage-lv{font-size:11px;color:#4a90d9;font-family:'MPLUS1Code',monospace}
.innate-section{margin-top:24px;border-top:1px solid #e8e8e8;padding-top:16px;text-align:center}
.innate-title{font-size:13px;font-weight:500;letter-spacing:.1em;color:#1a1a1a;margin-bottom:12px}
.innate-row{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.innate-label{font-size:10px;color:#999;width:32px;flex-shrink:0;font-family:'MPLUS1Code',monospace}
.innate-nums{display:flex;gap:4px}
.inn{font-size:14px;color:#bbb;width:18px;text-align:center;font-family:'MPLUS1Code',monospace}
.inn.has{color:#555}
.inn.obs{color:#c0392b;font-weight:500}
.flow-block{margin-top:24px;border-top:1px solid #e8e8e8;padding-top:16px;text-align:center}
.flow-title{font-size:13px;font-weight:500;letter-spacing:.1em;color:#1a1a1a;margin-bottom:12px}
.flow-row{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:0;font-size:13px;width:100%}
.flow-label{color:#999;flex-shrink:0;align-self:center;width:36px;text-align:center}
.flow-item{display:flex;align-items:baseline;gap:2px;justify-content:center}
.flow-num{color:#1a1a1a;font-size:13px;font-family:'MPLUS1Code',monospace}
.flow-lv{font-size:11px;color:#4a90d9;font-family:'MPLUS1Code',monospace}
.sign{font-size:13px;color:#999;margin-right:1px;font-family:'MPLUS1Code',monospace}
.flow-pair{display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;width:100px}
.flow-year-table{padding:12px 0 8px}
.flow-year-title{font-size:12px;font-weight:500;letter-spacing:.1em;color:#1a1a1a;margin:0 12px 12px;font-family:'M PLUS Rounded 1c',sans-serif}
.fyt-group{margin-bottom:8px;padding:0 12px;overflow-x:auto}
.fyt-grid{display:grid;grid-template-columns:repeat(9,1fr);border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;width:100%}
.fyt-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1px 0;border-right:1px solid #e8e8e8;border-bottom:1px solid #e8e8e8;overflow:hidden;min-width:0}
.fyt-cell:nth-child(9n){border-right:none}
.fyt-cell.age-row{background:#fff;border-bottom:1px solid #ddd}
.fyt-cell.year-row{border-bottom:1px solid #e0e0e0}
.fyt-cell.num-row{border-bottom:none}
.fyt-age{font-size:8px;color:#999;font-family:'MPLUS1Code',monospace;display:block;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fyt-year{font-size:8px;color:#333;font-family:'MPLUS1Code',monospace;display:block;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fyt-num{font-size:8px;color:#888;font-family:'MPLUS1Code',monospace;display:block;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fyt-num .d{color:#1a1a1a;font-weight:400}
.fyt-num .lv{font-size:6px;color:#4a90d9;vertical-align:super}
.fyt-cell.current{border-left:1.5px solid #555;border-right:1.5px solid #555}
.fyt-cell.current.age-row{border-top:1.5px solid #555}
.fyt-cell.current.num-row{border-bottom:1.5px solid #555}
.fyt-cell.current .fyt-age,.fyt-cell.current .fyt-year{font-weight:700}
.fyt-cell.current .fyt-num{font-weight:700}
.fyt-cell.current .fyt-num .d{font-weight:700}
/* 指導靈底色：歲次=六次元粉藍，西元=五次元粉黃，主秘數=四次元粉紅 */
.fyt-cell.age-row.g6{background:#d6eaff}
.fyt-cell.year-row.g5{background:#fff9d6}
.fyt-cell.num-row.g4{background:#ffd6d6}
.error{padding:20px;color:#c0392b;font-size:13px;text-align:center}
.hidden{display:none}
.panel{display:none}.panel.active{display:block}
/* 圖例 */
.guardian-legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:8px 12px 0;font-size:10px;color:#888;font-family:'M PLUS Rounded 1c',sans-serif}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}

// ── i18n ──────────────────────────────────────────────────────
const T={
  zh:{
    titleMain:'彩虹數字', titleSub:'計算器',

let lang='zh';
function t(key){return T[lang][key];}

function toggleLang(){
  lang=lang==='zh'?'en':'zh';
  applyLang();
  if(document.getElementById('mainResult').classList.contains('hidden')) return;
  const yearVal=document.getElementById('yearInput').value.trim();
  if(yearVal) calculate();
}

function applyLang(){
  const now=new Date();
  const y=now.getFullYear(),m=String(now.getMonth()+1).padStart(2,'0'),d=String(now.getDate()).padStart(2,'0');
  document.getElementById('todayDisplay').textContent=t('today')+' '+y+'/'+m+'/'+d;

  const labelYear=document.getElementById('labelYear');
  const labelMonth=document.getElementById('labelMonth');
  const labelDay=document.getElementById('labelDay');
  if(labelYear) labelYear.textContent=t('labelYear');
  if(labelMonth) labelMonth.textContent=t('labelMonth');
  if(labelDay) labelDay.textContent=t('labelDay');

  document.getElementById('labelMin').textContent=t('labelMin');
  document.getElementById('tab0').textContent=t('tab0');
  document.getElementById('tab1').textContent=t('tab1');
  document.getElementById('tab2').textContent=t('tab2');
  document.getElementById('innateTitle').textContent=t('innateTitle');
  document.getElementById('coffeeBtn').textContent=t('coffee');
  document.getElementById('footerStudio').textContent=t('studio');
  document.getElementById('langBtn').textContent=t('langBtn');
  if(lang==='en'){document.getElementById('titleSvg').style.display='none';document.getElementById('titleSvgEn').style.display='block';}
  else{document.getElementById('titleSvg').style.display='block';document.getElementById('titleSvgEn').style.display='none';}
  document.getElementById('titleSub').textContent=t('titleSub');
}

// ── Lunar ─────────────────────────────────────────────────────
function jde_new_moon(k){
  const T=k/1236.85,T2=T*T,T3=T2*T,T4=T3*T;
  let J=2451550.09766+29.530588861*k+0.00015437*T2-1.5e-7*T3+7.3e-10*T4;
  const E=1-0.002516*T-7.4e-6*T2;
  const M=(2.5534+29.10535670*k-1.4e-6*T2-1.1e-7*T3)*Math.PI/180;
  const M1=(201.5643+385.81693528*k+0.0107582*T2+1.238e-5*T3-5.8e-8*T4)*Math.PI/180;
  const F=(160.7108+390.67050284*k-0.0016118*T2-2.27e-6*T3+1.1e-8*T4)*Math.PI/180;
  const Om=(124.7746-1.56375588*k+0.0020672*T2+2.15e-6*T3)*Math.PI/180;
  const A1=(299.77+0.107408*k-0.009173*T2)*Math.PI/180;
  const A2=(251.88+0.016321*k)*Math.PI/180;
  J+=-0.40720*Math.sin(M1)+0.17241*E*Math.sin(M)+0.01608*Math.sin(2*M1)
    +0.01039*Math.sin(2*F)+0.00739*E*Math.sin(M1-M)-0.00514*E*Math.sin(M1+M)
    +0.00208*E*E*Math.sin(2*M)-0.00111*Math.sin(M1-2*F)-0.00057*Math.sin(M1+2*F)
    +0.00056*E*Math.sin(2*M1+M)-0.00042*Math.sin(3*M1)+0.00042*E*Math.sin(M+2*F)
    +0.00038*E*Math.sin(M-2*F)-0.00024*E*Math.sin(2*M1-M)-0.00017*Math.sin(Om)
    -0.00007*Math.sin(M1+2*M)+0.00004*Math.sin(2*M1-2*F)+0.00004*Math.sin(3*M)
    +0.00003*Math.sin(M1+M-2*F)+0.00003*Math.sin(2*M1+2*F)-0.00003*Math.sin(M1+M+2*F)
    +0.00003*Math.sin(M1-M+2*F)-0.00002*Math.sin(M1-M-2*F)-0.00002*Math.sin(3*M1+M)
    +0.00002*Math.sin(4*M1)+0.000325*Math.sin(A1)+0.000165*Math.sin(A2);
  return J;
}
function jde_to_date(jde){
  const jd=jde+8/24+0.5,Z=Math.floor(jd);
  let A=Z;if(Z>=2299161){const a=Math.floor((Z-1867216.25)/36524.25);A=Z+1+a-Math.floor(a/4);}
  const B=A+1524,C=Math.floor((B-122.1)/365.25),D=Math.floor(365.25*C),Ev=Math.floor((B-D)/30.6001);
  return{year:Ev<14?C-4716:C-4715,month:Ev<14?Ev-1:Ev-13,day:B-D-Math.floor(30.6001*Ev)};
}
function date_to_jdn(y,m,d){
  const a=Math.floor((14-m)/12),yr=y+4800-a,mo=m+12*a-3;
  return d+Math.floor((153*mo+2)/5)+365*yr+Math.floor(yr/4)-Math.floor(yr/100)+Math.floor(yr/400)-32045;
}
const leapMonths={1957:8,1960:6,1963:4,1966:3,1968:7,1971:5,1974:4,1976:8,1979:6,
  1982:4,1984:10,1987:6,1990:5,1993:3,1995:8,1998:5,

};
const nmSet=(()=>{
  const arr=[];
  const k0=Math.floor((1918-2001)*12.3685)-3,k1=Math.ceil((2028-1999)*12.3685)+3;
  for(let k=k0;k<=k1;k++){
    const d=jde_to_date(jde_new_moon(k));
    if(d.year>=1918&&d.year<=2029) arr.push(date_to_jdn(d.year,d.month,d.day));
  }
  return [...new Set(arr)].sort((a,b)=>a-b);
})();
function solarToLunar(sy,sm,sd){
  const tJDN=date_to_jdn(sy,sm,sd);
  let ly=sy;
  const sfThis=cny[sy];if(!sfThis) return null;
  if(tJDN<date_to_jdn(sy,sfThis[0],sfThis[1])) ly=sy-1;
  const sf=cny[ly];if(!sf) return null;
  const cnyJDN=date_to_jdn(ly,sf[0],sf[1]);
  const starts=nmSet.filter(j=>j>=cnyJDN).slice(0,15);
  let idx=0;
  for(let i=0;i<starts.length-1;i++){if(tJDN>=starts[i]&&tJDN<starts[i+1]){idx=i;break;}}
  const leap=leapMonths[ly]||0;
  let lm,isLeap=false;
  if(!leap){lm=idx+1;}
  else if(idx<leap){lm=idx+1;}
  else if(idx===leap){lm=leap;isLeap=true;}
  else{lm=idx;}
  return{year:ly,month:lm,day:tJDN-starts[idx]+1,isLeap};
}

// ── Numerology ────────────────────────────────────────────────
function digs(n){return String(Math.abs(Math.floor(n))).split('').map(Number);}
function sumArr(a){return a.reduce((x,y)=>x+y,0);}
function reduce(total){
  const parts=[total];let n=total;
  while(n>=10){n=digs(n).reduce((a,b)=>a+b,0);parts.push(n);}
  return parts;
}
function makeStage(total){
  if(total===0) return{str:'0',destiny:0,pathNums:[]};
  const parts=reduce(total);
  const str=parts.join('/');
  const destiny=parts[parts.length-1];
  const pathNums=[];
  for(let i=0;i<parts.length-1;i++){
    const p=parts[i];
    if(p>=10) digs(p).forEach(d=>{if(d>0&&!pathNums.includes(d))pathNums.push(d);});
    else if(p>0&&!pathNums.includes(p)) pathNums.push(p);
  }
  return{str,destiny,pathNums};
}
function calcStages(y,m,d,h,mn){
  const yD=digs(y),mD=p2(m).split('').map(Number),dD=p2(d).split('').map(Number);
  const innate=[...yD,...mD,...dD];
  const stages=[];
  stages.push({name:'老年',...makeStage(sumArr(yD))});
  stages.push({name:'中年',...makeStage(sumArr([...yD,...mD]))});
  stages.push({name:'青年',...makeStage(sumArr([...yD,...mD,...dD])),isDestiny:true});
  if(h!==null){
    stages.push({name:'少年',...makeStage(sumArr([...yD,...mD,...dD,...digs(h)]))});
    if(mn!==null){
      stages.push({name:'幼年',...makeStage(sumArr([...yD,...mD,...dD,...digs(h),...digs(mn)]))});
    }
  }
  const order=['幼年','少年','青年','中年','老年'];
  stages.sort((a,b)=>order.indexOf(a.name)-order.indexOf(b.name));
  return{innate,stages};
}
function calcLevel(innate,destiny,pathNums){
  const set=new Set(innate.filter(n=>n>0));
  const hasD=set.has(destiny);
  const allP=pathNums.filter(n=>n>0&&n!==destiny);
  const hasAllP=allP.length>0&&allP.every(n=>set.has(n));
  const hasSomeP=allP.some(n=>set.has(n));
  const counts={};
  for(const n of innate){if(n>0)counts[n]=(counts[n]||0)+1;}
  const hasObs=Object.values(counts).some(c=>c>=3);
  let level;
  if(!hasD&&!hasSomeP) level=1;
  else if(!hasD&&hasSomeP&&!hasAllP) level=2;
  else if(!hasD&&hasAllP) level=3;
  else if(hasD&&allP.length===0) level=4;
  else if(hasD&&!hasSomeP&&allP.length>0) level=4;
  else if(hasD&&hasSomeP&&!hasAllP) level=5;
  else if(hasD&&hasAllP&&hasObs) level=6;
  else level=7;
  return{level};
}
function calcFlow(y,m,d,targetY,targetM,targetD){
  const yD=digs(y),mD=digs(m),dD=digs(d);
  const fy=makeStage(sumArr([...digs(targetY),...mD,...dD]));
  const fm=makeStage(sumArr([...yD,...digs(targetM),...dD]));
  const fd=makeStage(sumArr([...yD,...mD,...digs(targetD)]));
  return{fy,fm,fd};
}

// ── Guardian Logic ────────────────────────────────────────────
// 判斷一個 stage 是否符合指導靈辨識條件
function isG4(stage){ // 29/11/2 or 11/2 (尾數2，前一層含11)
  const s=stage.str;
  return s==='29/11/2'||s==='11/2';
}
function isG5(stage){ // 39/12/3 or 12/3
  const s=stage.str;
  return s==='39/12/3'||s==='12/3';
}
function isG6(stage){ // 19/10/1 or 10/1
  const s=stage.str;
  return s==='19/10/1'||s==='10/1';
}

// 計算每個指導靈的啟動區間 [{start, end}]
// start = 第一次出現辨識條件的歲次
// end = 下一個尾數相同但不符合辨識條件的前一年的歲次，或99
function calcGuardianRanges(birthY,birthM,birthD){
  // 建立1-99歲的流年主秘數
  const rows=[];
  for(let age=1;age<=99;age++){
    const year=birthY+age-1;
    const fyD=digs(year),mD=p2(birthM).split('').map(Number),dD=p2(birthD).split('').map(Number);
    const stage=makeStage(sumArr([...fyD,...mD,...dD]));
    rows.push({age,stage});
  }

  function getRanges(isMatch){
    const ranges=[];
    let inRange=false;
    let startAge=null;
    const matchDestiny=isMatch===isG4?2:isMatch===isG5?3:1;
    for(let i=0;i<rows.length;i++){
      const{age,stage}=rows[i];
      if(!inRange){
        if(isMatch(stage)){
          inRange=true;
          startAge=age;
        }
      } else {
        // 結束條件：尾數相同但不符合辨識條件
        if(stage.destiny===matchDestiny&&!isMatch(stage)){
          ranges.push({start:startAge,end:age-1});
          // 檢查這個不符合的之後有沒有再次符合
          inRange=false;
          startAge=null;
          // 退回重新檢查這個 age 是否是新的啟動
          if(isMatch(stage)){
            inRange=true;
            startAge=age;
          }
        }
      }
    }
    if(inRange) ranges.push({start:startAge,end:99});
    return ranges;
  }

  return{
    g4:getRanges(isG4),
    g5:getRanges(isG5),
    g6:getRanges(isG6)
  };
}

function inRanges(age,ranges){
  return ranges.some(r=>age>=r.start&&age<=r.end);
}

function renderCalSection(el,isGreg,dateStr,y,m,d,h,mn,innate){
  const title=(isGreg?t('greg'):t('lun'))+' ('+(isGreg?'+':'-')+')';
  const{stages}=calcStages(y,m,d,h,mn);
  const hasTime=h!==null,hasMins=mn!==null;
  const cols=hasTime?(hasMins?5:4):3;
  const dateParts=[y,m,d];
  if(hasTime) dateParts.push(h);
  if(hasMins) dateParts.push(mn);
  const colStyle=`grid-template-columns:repeat(${cols},${cols<5?'minmax(60px,120px)':'1fr'});${cols<5?'justify-content:center;':''}`;
  let headerCells=dateParts.map((v,i)=>
    `<div class="num-cell label">${i===0?v:p2(v)}</div>`).join('');
  const stageOrder=['老年','中年','青年','少年','幼年'].slice(0,cols);
  let stageCells=stageOrder.map(name=>{
    const s=stages.find(x=>x.name===name);
    if(!s) return`<div class="num-cell"></div>`;
    const lv=calcLevel(innate,s.destiny,s.pathNums);
    const isd=name==='青年';
    return`<div class="num-cell"><div class="stage-val">
      <span class="stage-num${isd?' destiny':''}">${s.str}</span>
      <span class="stage-lv">${lv.level}</span>
    </div></div>`;
  }).join('');
  el.innerHTML=`
  <div class="cal-title">${title} <span>${dateStr}</span></div>
  <div class="num-header" style="${colStyle}">${headerCells}</div>
  <div class="num-row" style="${colStyle}">${stageCells}</div>`;
}

function renderInnate(el,innate,isGreg){
  const label=isGreg?t('greg'):t('lun');
  const counts={};
  for(const n of innate){if(n>0)counts[n]=(counts[n]||0)+1;}
  const sorted=[...innate].sort((a,b)=>a-b);
  const nums=sorted.map(n=>{
    const c=counts[n]||0;
    const cls=n===0?'inn':(c>=3?'inn obs':(c>=1?'inn has':'inn'));
    return`<span class="${cls}">${n}</span>`;
  }).join('');
  el.innerHTML=`<span class="innate-label">${label}</span><div class="innate-nums">${nums}</div>`;
}

function renderFlow(el,gregY,gregM,gregD,lunY,lunM,lunD,todayY,todayM,todayD){
  const gfl=calcFlow(gregY,gregM,gregD,todayY,todayM,todayD);
  const lunarToday=solarToLunar(todayY,todayM,todayD);
  const lty=lunarToday?lunarToday.year:todayY;
  const ltm=lunarToday?lunarToday.month:todayM;
  const ltd=lunarToday?lunarToday.day:todayD;
  const lfl=calcFlow(lunY,lunM,lunD,lty,ltm,ltd);
  const gInnate=[...digs(gregY),...digs(gregM),...digs(gregD)];
  const lInnate=[...digs(lunY),...digs(lunM),...digs(lunD)];
  function lvBadge(s,innate){
    const lv=calcLevel(innate,s.destiny,s.pathNums);
    return`<span class="flow-num">${s.str}</span><span class="flow-lv">${lv.level}</span>`;
  }
  el.innerHTML=`
  <div style="display:grid;grid-template-columns:1fr 1fr 1fr;width:100%;padding:0 20px;box-sizing:border-box">
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="innate-title" style="margin:0 0 6px">${t('flowYear')}</div>
      <div class="flow-item"><span class="sign">+</span>${lvBadge(gfl.fy,gInnate)}</div>
      <div class="flow-item"><span class="sign">-</span>${lvBadge(lfl.fy,lInnate)}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="innate-title" style="margin:0 0 6px">${t('flowMonth')}</div>
      <div class="flow-item"><span class="sign">+</span>${lvBadge(gfl.fm,gInnate)}</div>
      <div class="flow-item"><span class="sign">-</span>${lvBadge(lfl.fm,lInnate)}</div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:center;gap:4px">
      <div class="innate-title" style="margin:0 0 6px">${t('flowDay')}</div>
      <div class="flow-item"><span class="sign">+</span>${lvBadge(gfl.fd,gInnate)}</div>
      <div class="flow-item"><span class="sign">-</span>${lvBadge(lfl.fd,lInnate)}</div>
    </div>
  </div>`;
}

function renderFlowYearTable(el,birthY,birthM,birthD,innate,isGreg){
  const title=isGreg?t('flowTableGreg'):t('flowTableLun');
  const currentYear=new Date().getFullYear();
  const guardianRanges=calcGuardianRanges(birthY,birthM,birthD);

  const rows=[];
  for(let age=1;age<=99;age++){
    const year=birthY+age-1;
    const fyD=digs(year),mD=digs(birthM),dD=digs(birthD);
    const total=sumArr([...fyD,...mD,...dD]);
    const stage=makeStage(total);
    const lv=calcLevel(innate,stage.destiny,stage.pathNums);
    const g4=inRanges(age,guardianRanges.g4);
    const g5=inRanges(age,guardianRanges.g5);
    const g6=inRanges(age,guardianRanges.g6);
    rows.push({age,year,stage,lv,g4,g5,g6});
  }

  const groups=[];
  for(let i=0;i<rows.length;i+=9) groups.push(rows.slice(i,i+9));

  // 圖例
  const legend=`<div class="guardian-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ffd6d6"></div><span>${t('g4')}</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff9d6"></div><span>${t('g5')}</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#d6eaff"></div><span>${t('g6')}</span></div>
  </div>`;

  let html=`<div class="flow-year-table"><div class="flow-year-title">${title}</div>${legend}`;
  for(const group of groups){
    while(group.length<9) group.push(null);
    const ageCells=group.map(r=>{
      if(!r) return'<div class="fyt-cell age-row"></div>';
      const isCurrent=r.year===currentYear;
      const g6cls=r.g6?' g6':'';
      return`<div class="fyt-cell age-row${isCurrent?' current':''}${g6cls}"><div class="fyt-age">${r.age}</div></div>`;
    }).join('');
    const yearCells=group.map(r=>{
      if(!r) return'<div class="fyt-cell year-row"></div>';
      const isCurrent=r.year===currentYear;
      const g5cls=r.g5?' g5':'';
      return`<div class="fyt-cell year-row${isCurrent?' current':''}${g5cls}"><div class="fyt-year">${r.year}</div></div>`;
    }).join('');
    const numCells=group.map(r=>{
      if(!r) return'<div class="fyt-cell num-row"></div>';
      const isCurrent=r.year===currentYear;
      const g4cls=r.g4?' g4':'';
      const parts=r.stage.str.split('/');
      const fmt=parts.map((p,i)=>i===parts.length-1?`<span class="d">${p}</span>`:`${p}/`).join('');
      return`<div class="fyt-cell num-row${isCurrent?' current':''}${g4cls}"><div class="fyt-num">${fmt}<span class="lv">${r.lv.level}</span></div></div>`;
    }).join('');
    html+=`<div class="fyt-group"><div class="fyt-grid">${ageCells}${yearCells}${numCells}</div></div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

let lastCalc=null;
function calculate(){
  const sy=parseInt(document.getElementById('yearInput').value)||0;
  const sm=parseInt(document.getElementById('monthInput').value)||0;
  const sd=parseInt(document.getElementById('dayInput').value)||0;
  const shv=document.getElementById('hourInput').value.trim();
  const smnv=document.getElementById('minInput').value.trim();
  const sh=shv!==''?parseInt(shv):null;
  const smn=smnv!==''?parseInt(smnv):null;
  const errEl=document.getElementById('errorMsg');
  const main=document.getElementById('mainResult');
  errEl.classList.add('hidden');
  if(!sy||!sm||!sd||sy<1920||sy>2020||sm<1||sm>12||sd<1||sd>31){
    errEl.textContent=t('errDate');
    errEl.classList.remove('hidden');main.classList.add('hidden');return;
  }
  const lunar=solarToLunar(sy,sm,sd);
  if(!lunar){
    errEl.textContent=t('errLunar');
    errEl.classList.remove('hidden');main.classList.add('hidden');return;
  }
  const{year:ly,month:lm,day:ld,isLeap}=lunar;
  lastCalc={sy,sm,sd,ly,lm,ld,isLeap,sh,smn};
  const gInnate=String(sy).split('').concat(p2(sm).split(''),p2(sd).split('')).map(Number);
  const lInnate=String(ly).split('').concat(p2(lm).split(''),p2(ld).split('')).map(Number);
  renderCalSection(document.getElementById('gregSection'),true,`${sy}/${p2(sm)}/${p2(sd)}`,sy,sm,sd,sh,smn,gInnate);
  renderCalSection(document.getElementById('lunSection'),false,`${ly}/${p2(lm)}/${p2(ld)}${isLeap?t('leap'):''}`,ly,lm,ld,sh,smn,lInnate);
  renderInnate(document.getElementById('gregInnate'),gInnate,true);
  renderInnate(document.getElementById('lunInnate'),lInnate,false);
  document.getElementById('innateTitle').textContent=t('innateTitle');
  const now=new Date();
  renderFlow(document.getElementById('flowSection'),sy,sm,sd,ly,lm,ld,now.getFullYear(),now.getMonth()+1,now.getDate());
  renderFlowYearTable(document.getElementById('gregFlowTable'),sy,sm,sd,gInnate,true);
  renderFlowYearTable(document.getElementById('lunFlowTable'),ly,lm,ld,lInnate,false);
  main.classList.remove('hidden');
}
