<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#f5f5f5;color:#1a1a1a;font-family:'M PLUS Rounded 1c',sans-serif;min-height:100vh;padding:0 0 60px}
.page{max-width:480px;margin:0 auto;background:#fff;min-height:100vh}
.header{padding:32px 24px 20px;text-align:center;position:relative}
.lang-btn{position:absolute;top:32px;right:20px;font-size:11px;color:#999;border:1px solid #ddd;border-radius:12px;padding:4px 10px;cursor:pointer;background:#fff;font-family:'M PLUS Rounded 1c',sans-serif;letter-spacing:.05em;transition:all .15s}
.lang-btn:hover{color:#555;border-color:#bbb}
.input-area{padding:0 20px 20px}
.input-note{font-size:13px;color:#777;margin-bottom:16px;line-height:1.6;text-align:center}
.input-row{display:flex;gap:10px;margin-bottom:10px;width:100%}
.input-group{display:flex;flex-direction:column;gap:4px;min-width:0}
.input-group label{font-size:11px;color:#999;letter-spacing:.05em;text-align:center;display:block}
.input-group input{border:1px solid #ddd;border-radius:6px;padding:10px 4px;font-size:16px;font-family:'MPLUS1Code',monospace;color:#1a1a1a;outline:none;background:#fff;width:100%;text-align:center}
.input-group input:focus{border-color:#666}
.input-group input.invalid{border-color:#e74c3c;background:#fff5f5}
.input-group input::placeholder{color:#ccc}
.input-group.date,.input-group.time{flex:1}
.calc-btn{width:100%;padding:13px;background:#fff;border:1px solid #bbb;border-radius:8px;font-family:'M PLUS Rounded 1c',sans-serif;font-size:15px;color:#555;letter-spacing:.2em;cursor:pointer;margin-top:4px;transition:all .15s}
.calc-btn:hover{background:#f0f0f0;border-color:#999}
.tabs{display:flex;border-bottom:1px solid #e8e8e8}
.tab{flex:1;padding:12px 4px;font-size:13px;letter-spacing:.05em;text-align:center;color:#999;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;white-space:pre-line;line-height:1.4}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.results{padding:0 20px}
.cal-section{margin-top:24px;padding-top:8px}
.cal-section+.cal-section{margin-top:16px}
.cal-title{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:12px;text-align:center}
.cal-label{font-family:'MPLUS1Code',monospace;font-weight:500;font-size:13px}
.cal-sign{font-family:'MPLUS1Code',monospace;letter-spacing:0}
.num-header{display:grid;gap:0;border-bottom:2px solid #1a1a1a;padding-bottom:8px;margin-bottom:10px;justify-items:center}
.num-row{display:grid;gap:0;align-items:center;justify-items:center}
.num-cell{text-align:center;padding:4px 2px}
.num-cell.label{font-size:15px;font-weight:500;color:#1a1a1a;font-family:'MPLUS1Code',monospace;letter-spacing:0}
.stage-val{display:flex;align-items:baseline;justify-content:center;gap:2px}
.stage-num{font-size:14px;color:#1a1a1a;font-family:'MPLUS1Code',monospace;letter-spacing:0}
.stage-num.destiny{font-size:15px;font-weight:700;font-family:'MPLUS1Code',monospace}
.stage-num.destiny .stage-dest{color:#000;font-weight:700}
.stage-num.destiny .stage-path{color:#555;font-weight:700}
.stage-path{color:#888}
.stage-dest{color:#1a1a1a}
.stage-lv{font-size:11px;color:#4a90d9;font-family:'MPLUS1Code',monospace}
.innate-section{margin-top:32px;border-top:1px solid #e8e8e8;padding-top:32px;text-align:center}
.innate-title{font-size:13px;font-weight:500;letter-spacing:.1em;color:#1a1a1a;margin-bottom:12px}
.innate-row{margin-top:16px;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap}
.innate-label{font-size:10px;color:#999;width:32px;flex-shrink:0;font-family:'MPLUS1Code',monospace}
.innate-nums{display:flex;gap:4px}
.inn{font-size:14px;color:#bbb;width:18px;text-align:center;font-family:'MPLUS1Code',monospace}
.inn.has{color:#555}
.inn.obs{color:#c0392b;font-weight:500}
.flow-block{margin-top:32px;border-top:1px solid #e8e8e8;padding-top:32px;text-align:center}
.flow-title{font-size:13px;font-weight:500;letter-spacing:.1em;color:#1a1a1a;margin-bottom:12px}
.flow-row{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:0;font-size:13px;width:100%}
.flow-label{color:#999;flex-shrink:0;align-self:center;width:36px;text-align:center}
.flow-item{display:flex;align-items:baseline;gap:2px;justify-content:center}
.flow-num,.flow-path,.flow-dest{font-size:13px;font-family:'MPLUS1Code',monospace}
.flow-num{color:#1a1a1a}
.flow-path{color:#999}
.flow-dest{color:#1a1a1a}
.flow-lv{font-size:11px;color:#4a90d9;font-family:'MPLUS1Code',monospace}
.sign{font-size:13px;color:#1a1a1a;margin-right:1px;font-family:'MPLUS1Code',monospace}
.flow-pair{display:flex;flex-direction:column;gap:3px;align-items:center;justify-content:center;width:100px}
/* 新版流年流月流日 */
.flow-new-section{margin:0 0 20px}
.flow-new-title{font-size:12px;font-weight:500;letter-spacing:.1em;color:#1a1a1a;margin-bottom:12px;text-align:left}
.flow-new-grid{display:grid;gap:6px}
.flow-year-grid{grid-template-columns:repeat(3,1fr)}
.flow-month-grid{grid-template-columns:repeat(4,1fr)}
.flow-new-cell{border:1px solid #e8e8e8;border-radius:6px;padding:6px 4px;text-align:center}
.flow-new-label{font-size:11px;color:#999;margin-bottom:4px;font-family:'MPLUS1Code',monospace}
.flow-new-val{display:flex;align-items:baseline;justify-content:center;gap:1px;line-height:1.4}
.screenshot-btn{display:none}
.screenshot-btn-wrap{display:none}
@media(min-width:768px){.screenshot-btn{display:inline-block}.screenshot-btn-wrap{display:block}}
.flow-hl-label{font-weight:700;color:#b8860b}
.flow-hl-box,.flow-hl-single{box-shadow:0 0 0 2px #e6c96a;border-radius:4px}
/* 流日月曆 */
.flow-cal-grid{border:1px solid #e8e8e8;border-radius:8px;overflow:hidden;background:#e8e8e8}
.flow-cal-week{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e8e8e8}
.flow-cal-head{font-size:10px;color:#999;text-align:center;padding:3px 0;font-family:'MPLUS1Code',monospace;background:#fff;border-bottom:1px solid #e8e8e8}
.flow-cal-body{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e8e8e8}
.flow-cal-cell{padding:4px 2px;text-align:center;min-height:48px;background:#fff}
.flow-cal-cell.flow-cal-empty{background:#f9f9f9}
.flow-cal-day{font-size:9px;color:#999;margin-bottom:3px;font-family:'MPLUS1Code',monospace}
.flow-cal-today{color:#b8860b;font-weight:700}
.flow-cal-body .flow-new-val{font-size:8px;line-height:1.2}
.flow-cal-body .flow-path{font-size:8px}
.flow-cal-body .flow-dest{font-size:9px}
.flow-cal-body .flow-lv{font-size:7px;vertical-align:sub}
.flow-cal-body .sign{font-size:9px}
.flow-cal-body .flow-hl-box{border-radius:3px}
.flow-year-table{padding:32px 0 8px}
.flow-year-title{font-size:13px;font-weight:500;color:#1a1a1a;margin:0 12px 12px;font-family:'M PLUS Rounded 1c',sans-serif;text-align:center}
.fyt-group{margin-bottom:8px;padding:0;overflow-x:auto}
.fyt-grid{display:grid;grid-template-columns:repeat(9,1fr);border:1px solid #e0e0e0;border-radius:4px;overflow:hidden;width:100%}
.fyt-col{display:flex;flex-direction:column;position:relative}
.fyt-col-current{outline:2px solid #e6c96a;outline-offset:-1px;border-radius:3px;z-index:2}
.fyt-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1px 0;border-right:1px solid #e8e8e8;border-bottom:1px solid #e8e8e8;overflow:hidden;min-width:0}
.fyt-col:last-child .fyt-cell{border-right:none}
.fyt-cell.age-row{background:#fff;border-bottom:1px solid #ddd}
.fyt-cell.year-row{border-bottom:1px solid #e0e0e0}
.fyt-cell.num-row{border-bottom:none}
.fyt-age{font-size:8px;color:#999;font-family:'MPLUS1Code',monospace;display:block;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fyt-year{font-size:8px;color:#333;font-family:'MPLUS1Code',monospace;display:block;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fyt-num{font-size:8px;color:#888;font-family:'MPLUS1Code',monospace;display:block;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fyt-num .d{color:#1a1a1a;font-weight:400}
.fyt-num .lv{font-size:6px;color:#4a90d9;vertical-align:super}
.fyt-col-current .fyt-year{font-weight:700;color:#b8860b}
.fyt-col-current .fyt-age{font-weight:700;color:#b8860b}
.fyt-col-current .fyt-num{font-weight:700}
.fyt-col-current .fyt-num .d{font-weight:700;color:#b8860b}
/* 指導靈底色：歲次=六次元粉藍，西元=五次元粉黃，主秘數=四次元粉紅 */
.fyt-cell.age-row.g6{background:#d6eaff}
.fyt-cell.year-row.g5{background:#fff9d6}
.fyt-cell.num-row.g4{background:#ffd6d6}
.error{padding:20px;color:#c0392b;font-size:13px;text-align:center}
.hidden{display:none}
.panel{display:none}.panel.active{display:block}
/* 圖例 */
.guardian-legend{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;padding:0 12px 4px;font-size:10px;color:#888;font-family:'M PLUS Rounded 1c',sans-serif}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
/* 隱藏生日按鈕 */
.bd-toggle-btn{padding:2px 10px;border-radius:12px;border:1px solid #bbb;background:#fff;font-size:11px;color:#888;cursor:pointer;font-family:'M PLUS Rounded 1c',sans-serif;line-height:1.6}
/* 九宮格 */
.nine-grid-wrap{display:flex;gap:12px;justify-content:center;margin-top:16px}
.nine-grid-side{flex:1;min-width:0}
.nine-grid-label{font-size:11px;color:#999;text-align:center;margin-bottom:6px;font-family:'MPLUS1Code',monospace;letter-spacing:.05em}
.nine-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
.nine-grid-row3{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:5px}
.nine-cell{border:1px solid #ccc;border-radius:4px;padding:0;display:flex;flex-direction:column;align-items:center;justify-content:space-between;min-height:48px;background:#fff}
.nine-cell-spacer{height:12px;flex-shrink:0}
.nine-cell-num{font-size:14px;font-family:'MPLUS1Code',monospace;color:#1a1a1a;font-weight:500;line-height:1;text-align:center}
.nine-cell-count{font-size:9px;font-family:'MPLUS1Code',monospace;color:#c0392b;font-weight:500;line-height:1;padding-bottom:4px;text-align:center}
.nine-cell-empty{min-height:36px}
</style>

// ── Lunar ─────────────────────────────────────────────────────
function solarToLunar(sy,sm,sd){
  try{
    const solar=Solar.fromYmd(sy,sm,sd);
    const lunar=solar.getLunar();
    const lm=lunar.getMonth(); // 負數代表閏月
    const isLeap=lm<0;
    return{year:lunar.getYear(),month:Math.abs(lm),day:lunar.getDay(),isLeap};
  }catch(e){return null;}
}

function lunarToSolar(ly,lm,ld){
  try{
    const nextLm=lm===12?1:lm+1;
    const nextLy=lm===12?ly+1:ly;
    const lunar=Lunar.fromYmd(nextLy,nextLm,ld);
    const solar=lunar.getSolar();
    return{year:solar.getYear(),month:solar.getMonth(),day:solar.getDay()};
  }catch(e){return null;}
}

// ── Numerology ────────────────────────────────────────────────
function digs(n){return String(Math.abs(Math.floor(n))).split('').map(Number);}
function sumArr(a){return a.reduce((x,y)=>x+y,0);}
function reduce(total){
  const parts=[total];let n=total;
  while(n>=10){n=digs(n).reduce((a,b)=>a+b,0);parts.push(n);}
  return parts;
}
function makeStage(total){
  if(total===0) return{str:'0',destiny:0,pathNums:[]};
  const parts=reduce(total);
  // 加總若得一位數，補 0 成 02/2
  const str=parts.length===1?`0${parts[0]}/${parts[0]}`:parts.join('/');
  const destiny=parts[parts.length-1];
  const pathNums=[];
  if(parts.length===1){pathNums.push(0);pathNums.push(parts[0]);}
  for(let i=0;i<parts.length-1;i++){
    const p=parts[i];
    if(p>=10) digs(p).forEach(d=>{if(!pathNums.includes(d))pathNums.push(d);});
    else if(!pathNums.includes(p)) pathNums.push(p);
  }
  return{str,destiny,pathNums};
}
function calcStages(y,m,d,h,mn){
  const yD=digs(y),mD=p2(m).split('').map(Number),dD=p2(d).split('').map(Number);
  const innate=[...yD,...mD,...dD];
  const stages=[];
  stages.push({name:'老年',...makeStage(sumArr(yD))});
  stages.push({name:'中年',...makeStage(sumArr([...yD,...mD]))});
  stages.push({name:'青年',...makeStage(sumArr([...yD,...mD,...dD])),isDestiny:true});
  if(h!==null){
    stages.push({name:'少年',...makeStage(sumArr([...yD,...mD,...dD,...digs(h)]))});
    if(mn!==null){
      stages.push({name:'幼年',...makeStage(sumArr([...yD,...mD,...dD,...digs(h),...digs(mn)]))});
    }
  }
  const order=['幼年','少年','青年','中年','老年'];
  stages.sort((a,b)=>order.indexOf(a.name)-order.indexOf(b.name));
  return{innate,stages};
}
function calcLevel(innate,destiny,pathNums){
  const set=new Set(innate);
  const hasD=set.has(destiny);
  const allP=pathNums;
  const hasAllP=allP.length>0&&allP.every(n=>set.has(n));
  const hasSomeP=allP.length>0&&allP.some(n=>set.has(n));
  const counts={};
  for(const n of innate){if(n>0)counts[n]=(counts[n]||0)+1;}
  const hasObs=Object.values(counts).some(c=>c>=3);
  let level;
  if(!hasD&&!hasSomeP) level=1;
  else if(!hasD&&hasSomeP&&!hasAllP) level=2;
  else if(!hasD&&hasAllP) level=3;
  else if(hasD&&allP.length===0) level=4;
  else if(hasD&&!hasSomeP&&allP.length>0) level=4;
  else if(hasD&&hasSomeP&&!hasAllP) level=5;
  else if(hasD&&hasAllP&&hasObs) level=6;
  else level=7;
  return{level};
}
function calcFlow(y,m,d,targetY,targetM,targetD){
  const yD=digs(y),mD=digs(m),dD=digs(d);
  const fy=makeStage(sumArr([...digs(targetY),...mD,...dD]));
  const fm=makeStage(sumArr([...yD,...digs(targetM),...dD]));
  const fd=makeStage(sumArr([...yD,...mD,...digs(targetD)]));
  return{fy,fm,fd};
}

// ── Guardian Logic ────────────────────────────────────────────
// 判斷一個 stage 是否符合指導靈辨識條件
function isG4(stage){ // 29/11/2 or 11/2 (尾數2，前一層含11)
  const s=stage.str;
  return s==='29/11/2'||s==='11/2';
}
function isG5(stage){ // 39/12/3 or 12/3
  const s=stage.str;
  return s==='39/12/3'||s==='12/3';
}
function isG6(stage){ // 19/10/1 or 10/1
  const s=stage.str;
  return s==='19/10/1'||s==='10/1';
}

// 計算每個指導靈的啟動區間 [{start, end}]
// start = 第一次出現辨識條件的歲次
// end = 下一個尾數相同但不符合辨識條件的前一年的歲次，或99
function calcGuardianRanges(birthY,birthM,birthD){
  // 建立1-99歲的流年主秘數
  const rows=[];
  for(let age=1;age<=99;age++){
    const year=birthY+age-1;
    const fyD=digs(year),mD=p2(birthM).split('').map(Number),dD=p2(birthD).split('').map(Number);
    const stage=makeStage(sumArr([...fyD,...mD,...dD]));
    rows.push({age,stage});
  }

  function getRanges(isMatch){
    const ranges=[];
    let inRange=false;
    let startAge=null;
    const matchDestiny=isMatch===isG4?2:isMatch===isG5?3:1;
    for(let i=0;i<rows.length;i++){
      const{age,stage}=rows[i];
      if(!inRange){
        if(isMatch(stage)){
          inRange=true;
          startAge=age;
        }
      } else {
        // 結束條件：尾數相同但不符合辨識條件
        if(stage.destiny===matchDestiny&&!isMatch(stage)){
          ranges.push({start:startAge,end:age-1});
          // 檢查這個不符合的之後有沒有再次符合
          inRange=false;
          startAge=null;
          // 退回重新檢查這個 age 是否是新的啟動
          if(isMatch(stage)){
            inRange=true;
            startAge=age;
          }
        }
      }
    }
    if(inRange) ranges.push({start:startAge,end:99});
    return ranges;
  }

  return{
    g4:getRanges(isG4),
    g5:getRanges(isG5),
    g6:getRanges(isG6)
  };
}

function inRanges(age,ranges){
  return ranges.some(r=>age>=r.start&&age<=r.end);
}

// ── 流年流月流日共用計算 ──
function calcFlowData(gregY,gregM,gregD,lunY,lunM,lunD,todayY,todayM,todayD){
  const gBdPassed=(todayM>gregM)||(todayM===gregM&&todayD>=gregD);
  const gFY=gBdPassed?todayY:todayY-1;
  const gDayPassed=todayD>=gregD;
  let gFM=todayM;
  if(!gDayPassed){gFM=todayM-1;if(gFM<1)gFM=12;}
  const lunarToday=solarToLunar(todayY,todayM,todayD);
  const lty=lunarToday?lunarToday.year:todayY;
  const ltm=lunarToday?lunarToday.month:todayM;
  const ltd=lunarToday?lunarToday.day:todayD;
  const lBdPassed=(ltm>lunM)||(ltm===lunM&&ltd>=lunD);
  const lFY=lBdPassed?lty:lty-1;
  const lDayPassed=ltd>=lunD;
  let lFM=ltm;
  if(!lDayPassed){lFM=ltm-1;if(lFM<1)lFM=12;}
  const gInnate=[...digs(gregY),...digs(gregM),...digs(gregD)];
  const lInnate=[...digs(lunY),...digs(lunM),...digs(lunD)];
  return{gFY,gFM,lFY,lFM,gInnate,lInnate};
}

function flowLvBadge(s,innate,bold=false){
  const lv=calcLevel(innate,s.destiny,s.pathNums);
  const parts=s.str.split('/');
  const fw=bold?'font-weight:700;':'';
  const pathHtml=parts.slice(0,-1).map(p=>`<span class="flow-path" style="${fw}">${p}/</span>`).join('');
  const destHtml=`<span class="flow-dest" style="${fw}">${parts[parts.length-1]}</span>`;
  return pathHtml+destHtml+`<span class="flow-lv" style="${fw}">${lv.level}</span>`;
}

      const lVal=`<div class="flow-new-val${isCurrentL?' flow-hl-single':''}"><span class="sign">-</span>${flowLvBadge(lS,lInnate,isCurrentL)}</div>`;
      let inner;
      if(bothActive) inner=`<div class="flow-hl-box">${gVal}${lVal}</div>`;
      else inner=`${gVal}${lVal}`;
      return`<div class="flow-new-cell">
        <div class="flow-new-label${isCurrent?' flow-hl-label':''}">${lbl}</div>
        ${inner}
      </div>`;
    }).join('');
    const supLabel=isLeap&&s.sup==='²'?`<div style="border-top:1px dashed #ddd;margin:8px 0 6px"></div>`:'';
    html+=supLabel+`<div class="flow-new-grid flow-month-grid">${fmCells}</div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

// ── 流日 ──
function renderFlowDay(el,sets,todayY,todayM,todayD){
  const isLeap=sets.length>1;
  const weekLabels=lang==='en'?['Mon','Tue','Wed','Thu','Fri','Sat','Sun']:['週一','週二','週三','週四','週五','週六','週日'];
  const weekHeaders=weekLabels.map(w=>`<div class="flow-cal-head">${w}</div>`).join('');
  const calYear=todayY,calMonth=todayM;
  const firstDay=new Date(calYear,calMonth-1,1).getDay();
  const startOffset=(firstDay+6)%7;
  const daysInMonth=new Date(calYear,calMonth,0).getDate();
  const monthNames=lang==='en'?['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']:['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
  const prevMonthLabel=lang==='en'?'← Prev':'← 上月';
  const nextMonthLabel=lang==='en'?'Next →':'下月 →';
  const monthNavHtml=`<div style="display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px">
    <button onclick="if(_flowDayNavMonth===1){_flowDayNavMonth=12;_flowDayNavYear--;}else{_flowDayNavMonth--;}_reRenderFlowDay()" style="background:none;border:1px solid #ddd;border-radius:20px;padding:3px 10px;font-size:11px;color:#666;cursor:pointer">${prevMonthLabel}</button>
    <span style="font-size:13px;font-weight:600">${calYear}/${String(calMonth).padStart(2,'0')}</span>
    <button onclick="if(_flowDayNavMonth===12){_flowDayNavMonth=1;_flowDayNavYear++;}else{_flowDayNavMonth++;}_reRenderFlowDay()" style="background:none;border:1px solid #ddd;border-radius:20px;padding:3px 10px;font-size:11px;color:#666;cursor:pointer">${nextMonthLabel}</button>
  </div>`;
  let html='<div class="flow-new-section"><div class="flow-new-title" style="text-align:center">'+t('flowDay')+'</div>'+monthNavHtml;
  for(const s of sets){
    const{gInnate,lInnate}=calcFlowData(s.gregY,s.gregM,s.gregD,s.lunY,s.lunM,s.lunD,todayY,todayM,todayD);
    function fdStageG(dy){return makeStage(sumArr([...digs(s.gregY),...digs(s.gregM),...digs(dy)]));}
    function fdStageL(dy){
      const lunar=solarToLunar(calYear,calMonth,dy);
      const ld=lunar?lunar.day:dy;
      return makeStage(sumArr([...digs(s.lunY),...digs(s.lunM),...digs(ld)]));
    }
    let calCells='';
    for(let i=0;i<startOffset;i++) calCells+=`<div class="flow-cal-cell flow-cal-empty"></div>`;
    const realToday=new Date();
    const realTodayY=realToday.getFullYear(),realTodayM=realToday.getMonth()+1,realTodayD=realToday.getDate();
    for(let dy=1;dy<=daysInMonth;dy++){
      const isToday=(dy===realTodayD&&calMonth===realTodayM&&calYear===realTodayY);
      calCells+=`<div class="flow-cal-cell${isToday?' flow-current':''}">
        <div class="flow-cal-day${isToday?' flow-cal-today':''}">${dy}</div>
        ${isToday?`<div class="flow-hl-box">`:''}
        <div class="flow-new-val"><span class="sign">+</span>${flowLvBadge(fdStageG(dy),gInnate,isToday)}</div>
        <div class="flow-new-val"><span class="sign">-</span>${flowLvBadge(fdStageL(dy),lInnate,isToday)}</div>
        ${isToday?'</div>':''}
      </div>`;
    }
    const supLabel=isLeap&&s.sup==='²'?`<div style="border-top:1px dashed #ddd;margin:8px 0 6px"></div>`:'';
    html+=supLabel+`<div class="flow-cal-grid"><div class="flow-cal-week">${weekHeaders}</div><div class="flow-cal-body">${calCells}</div></div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}


function renderFlowYearTable(el,birthY,birthM,birthD,innate,isGreg,isLeap,h=null,mn=null){
  const today=new Date();
  const todayY=today.getFullYear();
  const todayM=today.getMonth()+1;
  const todayD=today.getDate();
  let currentYear;
  if(isGreg){
    const birthdayPassed=(todayM>birthM)||(todayM===birthM&&todayD>=birthD);
    currentYear=birthdayPassed?todayY:todayY-1;
  } else {
    const lunarToday=solarToLunar(todayY,todayM,todayD);
    const lty=lunarToday?lunarToday.year:todayY;
    const ltm=lunarToday?lunarToday.month:todayM;
    const ltd=lunarToday?lunarToday.day:todayD;
    const birthdayPassed=(ltm>birthM)||(ltm===birthM&&ltd>=birthD);
    currentYear=birthdayPassed?lty:lty-1;
  }
  const guardianRanges=calcGuardianRanges(birthY,birthM,birthD);

  const rows=[];
  for(let age=1;age<=99;age++){
    const year=birthY+age-1;
    const fyD=digs(year),mD=digs(birthM),dD=digs(birthD);
    const total=sumArr([...fyD,...mD,...dD]);
    const stage=makeStage(total);
    const lv=calcLevel(innate,stage.destiny,stage.pathNums);
    const g4=inRanges(age,guardianRanges.g4);
    const g5=inRanges(age,guardianRanges.g5);
    const g6=inRanges(age,guardianRanges.g6);
    rows.push({age,year,stage,lv,g4,g5,g6});
  }

  const groups=[];
  for(let i=0;i<rows.length;i+=9) groups.push(rows.slice(i,i+9));

  // 圖例
  const legend=`<div class="guardian-legend">
    <div class="legend-item"><div class="legend-dot" style="background:#ffd6d6"></div><span>${t('g4')}</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#fff9d6"></div><span>${t('g5')}</span></div>
    <div class="legend-item"><div class="legend-dot" style="background:#d6eaff"></div><span>${t('g6')}</span></div>
  </div>`;

  const sign=isGreg?'<span class="cal-sign">(+)</span>':'<span class="cal-sign">(-)</span>';
  const calTitle=`<span class="cal-label">${isGreg?t('greg'):t('lun')}</span>${sign}`;
  const titleWithDate=`<div class="cal-title">${calTitle}</div>`;
  const hasTime=h!==null,hasMins=mn!==null;
  const ftCols=hasTime?(hasMins?5:4):3;
  const bdParts=[birthY,(isLeap?`<span style="font-size:11px;color:#e06c75;margin-right:1px;vertical-align:middle">${t('leap')}</span>`:'')+p2(birthM),p2(birthD)];
  if(h!==null) bdParts.push(p2(h));
  if(mn!==null) bdParts.push(p2(mn));
  const bdCells=bdParts.map(v=>`<div class="num-cell label">${v}</div>`).join('');
  const bdHeader=`<div class="num-header" style="grid-template-columns:repeat(${ftCols},1fr)">${bdCells}</div>`;
  // 五大階段數
  const{stages:ftStages}=calcStages(birthY,birthM,birthD,h,mn);
  const ftStageOrder=['老年','中年','青年','少年','幼年'].slice(0,ftCols);
  const ftStageCells=ftStageOrder.map(name=>{
    const s=ftStages.find(x=>x.name===name);
    if(!s) return`<div class="num-cell"></div>`;
    const lv=calcLevel(innate,s.destiny,s.pathNums);
    const isd=name==='青年';
    const parts=s.str.split('/');
    const fmt=parts.map((p,i)=>i===parts.length-1?`<span class="stage-dest">${p}</span>`:`<span class="stage-path">${p}/</span>`).join('');
    return`<div class="num-cell"><div class="stage-val">
      <span class="stage-num${isd?' destiny':''}">${fmt}</span>
      <span class="stage-lv">${lv.level}</span>
    </div></div>`;
  }).join('');
  const stagesRow=`<div class="num-row" style="grid-template-columns:repeat(${ftCols},1fr);margin-bottom:24px">${ftStageCells}</div>`;
  const birthdayPassedForWege=isGreg
    ?(todayM>birthM)||(todayM===birthM&&todayD>=birthD)
    :(()=>{const lt=solarToLunar(todayY,todayM,todayD);const ltm=lt?lt.month:todayM;const ltd=lt?lt.day:todayD;return(ltm>birthM)||(ltm===birthM&&ltd>=birthD);})();
  const wegeYear=birthdayPassedForWege?todayY:todayY-1;
  const currentWege=((wegeYear-birthY+1)%9+9)%9||9;
  const wegeNames=lang==='en'
    ?['Set<br>Your<br>Goal','Plan<br>and<br>Try','Clear<br>the<br>Old','Root<br>the<br>Value','Stay<br>or<br>Pivot','Mend<br>and<br>Heal','Let<br>Karma<br>Reveal','Review<br>and<br>Settle','Rest<br>and<br>Still']
    :['立定目標','佈局試探','清理舊習','格局抉擇','尋適守成','和解療癒','驗收因果','結算檢討','休息沈澱'];
  const wegeCells=Array.from({length:9},(_,i)=>{
    const isActive=(i+1)===currentWege;
    const bg=isActive?'background:#fdf0c8;':'background:#fff;';
    const color=isActive?'color:#b8860b;font-weight:600;':'color:#bbb;';
    const nameColor=isActive?'color:#b8860b;font-weight:500;':'color:#ccc;';
    return`<div class="fyt-col">
      <div class="fyt-cell age-row" style="${bg}"><div class="fyt-age" style="${color}">${lang==='en'?`Phase ${i+1}`:`位格${i+1}`}</div></div>
      <div class="fyt-cell num-row" style="border-bottom:none;${bg}"><div class="fyt-age" style="${nameColor}white-space:normal;word-break:break-word;line-height:1.3;text-align:center;padding:2px 1px">${wegeNames[i]}</div></div>
    </div>`;
  }).join('');
  const wegeHeader=`<div class="fyt-group"><div class="fyt-grid">${wegeCells}</div></div>`;
  let html=`<div class="flow-year-table">${titleWithDate}${bdHeader}${stagesRow}<div class="flow-year-title">${t('flowTableSuffix')}</div>${legend}${wegeHeader}`;
  for(const group of groups){
    while(group.length<9) group.push(null);
    const colCells=group.map(r=>{
      if(!r) return`<div class="fyt-col"><div class="fyt-cell age-row"></div><div class="fyt-cell year-row"></div><div class="fyt-cell num-row"></div></div>`;
      const isCurrent=r.year===currentYear;
      const stateCls=isCurrent?' current':'';
      const g6cls=r.g6?' g6':'';
      const g5cls=r.g5?' g5':'';
      const g4cls=r.g4?' g4':'';
      const parts=r.stage.str.split('/');
      const fmt=parts.map((p,i)=>i===parts.length-1?`<span class="d">${p}</span>`:`${p}/`).join('');
      const wrapCls=isCurrent?' fyt-col-current':'';
      return`<div class="fyt-col${wrapCls}">
        <div class="fyt-cell age-row${g6cls}"><div class="fyt-age">${r.age}</div></div>
        <div class="fyt-cell year-row${stateCls}${g5cls}"><div class="fyt-year">${r.year}</div></div>
        <div class="fyt-cell num-row${stateCls}${g4cls}"><div class="fyt-num">${fmt}<span class="lv">${r.lv.level}</span></div></div>
      </div>`;
    }).join('');
    html+=`<div class="fyt-group"><div class="fyt-grid">${colCells}</div></div>`;
  }
  html+='</div>';
  el.innerHTML=html;
}

function renderPartial(){_resetFlowNav();
  const syRaw=document.getElementById('inputYear').value.trim();
  const smRaw=document.getElementById('inputMonth').value.trim();
  const sdRaw=document.getElementById('inputDay').value.trim();
  const shRaw=document.getElementById('inputHour').value.trim();
  const smnRaw=document.getElementById('inputMin').value.trim();
  const sy=parseInt(syRaw)||0;
  const sm=parseInt(smRaw)||0;
  const sd=parseInt(sdRaw)||0;
  const errEl=document.getElementById('errorMsg');
  const main=document.getElementById('mainResult');
  errEl.classList.add('hidden');

  const hasYear=syRaw.length===4&&sy>0;
  const hasMonth=smRaw.length>0&&sm>=1&&sm<=12;
  const hasDay=sdRaw.length>0&&sd>=1&&sd<=31;

  // 驗證紅框
  document.getElementById('inputMonth').classList.toggle('invalid', smRaw.length>0&&!hasMonth);
  document.getElementById('inputDay').classList.toggle('invalid', sdRaw.length>0&&!hasDay);
  const shv=shRaw;
  const smnv=smnRaw;
  document.getElementById('inputHour').classList.toggle('invalid', shRaw.length>0&&(parseInt(shRaw)<0||parseInt(shRaw)>23||isNaN(parseInt(shRaw))));

  if(!hasYear){main.classList.add('hidden');return;}
  const sh=shRaw.length>0&&parseInt(shRaw)>=0&&parseInt(shRaw)<=23?parseInt(shRaw):null;
  const smn=smnRaw.length>0&&parseInt(smnRaw)>=0&&parseInt(smnRaw)<=59?parseInt(smnRaw):null;

  // 決定要顯示幾欄
  // 只有年：老年
  // 年月：老年、中年
  // 年月日：全部
  const gregSection=document.getElementById('gregSection');
  const lunSection=document.getElementById('lunSection');

  if(hasYear&&!hasMonth){
    // 只顯示老年數（陽曆）
    const yD=digs(sy);
    const elderStage=makeStage(sumArr(yD));
    const innate=p2(sy).length===4?String(sy).split('').map(Number):yD;
    const lv=calcLevel(innate,elderStage.destiny,elderStage.pathNums);
    gregSection.innerHTML=`
    <div class="cal-title">${t('greg')}<span class="cal-sign">(+)</span></div>
    <div class="num-header" style="grid-template-columns:1fr;justify-content:center"><div class="num-cell label">${sy}</div></div>
    <div class="num-row" style="grid-template-columns:1fr;justify-content:center"><div class="num-cell"><div class="stage-val"><span class="stage-num">${elderStage.str.split('/').map((p,i,a)=>i===a.length-1?'<span class="stage-dest">'+p+'</span>':'<span class="stage-path">'+p+'/</span>').join('')}</span><span class="stage-lv">${lv.level}</span></div></div></div>`;
    lunSection.innerHTML='';
    document.getElementById('innateSection').style.display='none';
    document.getElementById('flowBlock').style.display='none';
    main.classList.remove('hidden');
    initScreenshotBtn();
    return;
  }

  if(hasYear&&hasMonth&&!hasDay){
    // 顯示老年、中年（陽曆）
    const yD=digs(sy),mD=p2(sm).split('').map(Number);
    const innate=[...String(sy).split('').map(Number),...mD];
    const elderStage=makeStage(sumArr(yD));
    const midStage=makeStage(sumArr([...yD,...mD]));
    const elvEl=calcLevel(innate,elderStage.destiny,elderStage.pathNums);
    const mlvEl=calcLevel(innate,midStage.destiny,midStage.pathNums);
    gregSection.innerHTML=`
    <div class="cal-title">${t('greg')}<span class="cal-sign">(+)</span></div>
    <div class="num-header" style="grid-template-columns:repeat(2,minmax(60px,120px));justify-content:center"><div class="num-cell label">${sy}</div><div class="num-cell label">${p2(sm)}</div></div>
    <div class="num-row" style="grid-template-columns:repeat(2,minmax(60px,120px));justify-content:center">
      <div class="num-cell"><div class="stage-val"><span class="stage-num">${elderStage.str.split('/').map((p,i,a)=>i===a.length-1?'<span class="stage-dest">'+p+'</span>':'<span class="stage-path">'+p+'/</span>').join('')}</span><span class="stage-lv">${elvEl.level}</span></div></div>
      <div class="num-cell"><div class="stage-val"><span class="stage-num">${midStage.str.split('/').map((p,i,a)=>i===a.length-1?'<span class="stage-dest">'+p+'</span>':'<span class="stage-path">'+p+'/</span>').join('')}</span><span class="stage-lv">${mlvEl.level}</span></div></div>
    </div>`;
    lunSection.innerHTML='';
    document.getElementById('innateSection').style.display='none';
    document.getElementById('flowBlock').style.display='none';
    main.classList.remove('hidden');
    initScreenshotBtn();
    return;
  }

  if(hasYear&&hasMonth&&hasDay){
    document.getElementById('innateSection').style.display='';
    document.getElementById('flowBlock').style.display='';
    // 完整計算
    const lunar=solarToLunar(sy,sm,sd);
    if(!lunar){main.classList.add('hidden');return;}
    const{year:ly,month:lm,day:ld,isLeap}=lunar;
    const gInnate=String(sy).split('').concat(p2(sm).split(''),p2(sd).split('')).map(Number);
    const lInnate=String(ly).split('').concat(p2(lm).split(''),p2(ld).split('')).map(Number);
    renderCalSection(gregSection,true,`${sy}/${p2(sm)}/${p2(sd)}`,sy,sm,sd,sh,smn,gInnate);

    renderInnate(document.getElementById('lunInnate'),lInnate,false);
    // 青年數（主命數）的所有數字，保留重複
    const gDestinyTotal=sumArr([...String(sy).split('').map(Number),...p2(sm).split('').map(Number),...p2(sd).split('').map(Number)]);
    const lDestinyTotal=sumArr([...String(ly).split('').map(Number),...p2(lm).split('').map(Number),...p2(ld).split('').map(Number)]);
    function destinyAllDigs(total){
      if(total===0) return[0];
      const parts=[];let n=total;
      while(n>=10){parts.push(n);n=digs(n).reduce((a,b)=>a+b,0);}
      parts.push(n);
      const all=[];
      for(const p of parts){
        if(p>=10) digs(p).forEach(d=>all.push(d));
        else all.push(p);
      }
      return all;

    renderInnate(document.getElementById('lunInnate'),lInnate,false);
    document.getElementById('innateTitle').textContent=t('innateTitle');

        renderInnate(document.getElementById('lunInnate2'),lInnate2,false);
        renderFlowYearTable(document.getElementById('gregFlowTable2'),sy2,sm2,sd2,gInnate2,true,false,sh,smn);
        renderFlowYearTable(document.getElementById('lunFlowTable2'),ly2,lm2,ld,lInnate2,false,false,sh,smn);

        renderFlowYear(document.getElementById('flowYearBlock'),flowSets2,nowY,nowM,nowD);

      document.getElementById('lunInnate2').classList.add('hidden');
      document.getElementById('panel3').classList.add('hidden');
      document.getElementById('panel4').classList.add('hidden');
      document.getElementById('gregFlowTable2').innerHTML='';
      document.getElementById('lunFlowTable2').innerHTML='';
      const t3=document.getElementById('tab3');
      const t4=document.getElementById('tab4');
      if(t3) t3.remove();
      if(t4) t4.remove();
      document.getElementById('tab1').textContent=t('tab1no');
      document.getElementById('tab2').textContent=t('tab2no');
    }
    main.classList.remove('hidden');
    initScreenshotBtn();
  }
}

function calculate(silent=false){
  const sy=parseInt(document.getElementById('inputYear').value)||0;
  const sm=parseInt(document.getElementById('inputMonth').value)||0;
  const sd=parseInt(document.getElementById('inputDay').value)||0;
  const errEl=document.getElementById('errorMsg');
  const main=document.getElementById('mainResult');
  errEl.classList.add('hidden');
  if(!sy||!sm||!sd||sy<1||sm<1||sm>12||sd<1||sd>31){
    if(!silent){errEl.textContent=t('errDate');errEl.classList.remove('hidden');}
    main.classList.add('hidden');return;
  }
  renderPartial();
}

function switchTab(idx){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',i===idx));
  ['panel0','panel1','panel2','panel3','panel4'].forEach((id,i)=>{
    const p=document.getElementById(id);
    if(p&&!p.classList.contains('hidden')) p.classList.toggle('active',i===idx);
  });
}

// 五欄位輸入事件
const _inputIds=['inputYear','inputMonth','inputDay','inputHour','inputMin'];
_inputIds.forEach(function(id){
  const el=document.getElementById(id);
  el.addEventListener('input',function(){
    this.value=this.value.replace(/[^0-9]/g,'');
    // 自動跳下一格
    const maxLen=parseInt(this.getAttribute('maxlength'));
    if(this.value.length>=maxLen){
      const next=_inputIds[_inputIds.indexOf(id)+1];
      if(next) document.getElementById(next).focus();
    }
    renderPartial();
  });
  el.addEventListener('keydown',function(e){
    if(e.key==='Backspace'&&this.value===''){
      const prev=_inputIds[_inputIds.indexOf(id)-1];
      if(prev){
        e.preventDefault();
        const prevEl=document.getElementById(prev);
        prevEl.focus();
        // 移到末位
        const len=prevEl.value.length;
        prevEl.setSelectionRange(len,len);
      }
    }
  });
});
function toggleAllBdHeaders(btn){
  const headers=document.querySelectorAll('.bd-header');
  if(!headers.length) return;
  const hidden=headers[0].dataset.hidden==='1';
  headers.forEach(hd=>{
    hd.querySelectorAll('.num-cell').forEach(c=>c.style.visibility=hidden?'visible':'hidden');
    hd.dataset.hidden=hidden?'0':'1';
  });
  btn.textContent=hidden?t('hideBd'):t('showBd');
}

// 截圖（桌面版才顯示按鈕）
function initScreenshotBtn(){}

function takeScreenshot(){
  const btn=document.getElementById('screenshotBtn');
  const el=document.getElementById('stagesCapture');
  if(!el||!btn) return;
  const origText=document.getElementById('screenshotText').textContent;
  document.getElementById('screenshotText').textContent='截圖中...';
  btn.disabled=true;
  html2canvas(el,{scale:2,useCORS:true,backgroundColor:'#fff'}).then(canvas=>{
    const link=document.createElement('a');
    const y=document.getElementById('inputYear').value||'rainbow';
    const mo=document.getElementById('inputMonth').value||'';
    const dy=document.getElementById('inputDay').value||'';
    const name=mo&&dy?`${y}-${mo}-${dy}`:y;
    link.download=`彩虹數字_${name}.png`;
    link.href=canvas.toDataURL('image/png');
    link.click();
    document.getElementById('screenshotText').textContent=origText;
    btn.disabled=false;
  }).catch(()=>{
    document.getElementById('screenshotText').textContent=origText;
    btn.disabled=false;
  });
}
